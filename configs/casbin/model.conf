# Flownatty Authorization Model
# RBAC with Domains (Multi-Tenant)

# Purpose: Defines the authorization model structure (PERM).

# What it does:

# Defines the authorization logic

# Tells Casbin how to evaluate permission checks

# Enables RBAC with domains (multi-tenant)

[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

# Matcher: Domain check first for performance
# Reordered: dom and obj/act checks before role lookup
[matchers]
m = r.dom == p.dom && r.obj == p.obj && r.act == p.act && g(r.sub, p.sub, r.dom)